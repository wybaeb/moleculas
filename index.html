<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Molecule Viewer</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <!-- 3Dmol.js Library -->
  <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap"
    rel="stylesheet">
  <script type="module" crossorigin src="./assets/index-DmP-eZAF.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-hEUOrHo_.css">
</head>

<body>
  <div id="app">
    <aside class="sidebar">
      <header>
        <div class="logo">
          <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
            <defs>
              <radialGradient id="logo-o" cx="38%" cy="30%" r="68%">
                <stop offset="0%" stop-color="#ffcdd2"/>
                <stop offset="40%" stop-color="#e53935"/>
                <stop offset="100%" stop-color="#7f0000"/>
              </radialGradient>
              <radialGradient id="logo-h" cx="38%" cy="30%" r="68%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="40%" stop-color="#90caf9"/>
                <stop offset="100%" stop-color="#0d47a1"/>
              </radialGradient>
              <filter id="logo-shadow" x="-30%" y="-30%" width="160%" height="160%">
                <feDropShadow dx="0.3" dy="0.8" stdDeviation="0.9" flood-color="rgba(0,0,0,0.55)"/>
              </filter>
            </defs>
            <!-- Bonds -->
            <line x1="12" y1="16.5" x2="4.8" y2="8.2" stroke="#9fa8da" stroke-width="1.7" stroke-linecap="round" opacity="0.75"/>
            <line x1="12" y1="16.5" x2="19.2" y2="8.2" stroke="#9fa8da" stroke-width="1.7" stroke-linecap="round" opacity="0.75"/>
            <!-- Oxygen -->
            <circle cx="12" cy="17" r="5.4" fill="url(#logo-o)" filter="url(#logo-shadow)"/>
            <!-- Hydrogens -->
            <circle cx="4.6" cy="8" r="3.4" fill="url(#logo-h)" filter="url(#logo-shadow)"/>
            <circle cx="19.4" cy="8" r="3.4" fill="url(#logo-h)" filter="url(#logo-shadow)"/>
            <!-- Specular highlights -->
            <ellipse cx="10.3" cy="15.2" rx="1.9" ry="1.3" fill="rgba(255,255,255,0.45)" transform="rotate(-28 10.3 15.2)"/>
            <ellipse cx="3.4" cy="6.8" rx="1.2" ry="0.85" fill="rgba(255,255,255,0.5)" transform="rotate(-28 3.4 6.8)"/>
            <ellipse cx="18.2" cy="6.8" rx="1.2" ry="0.85" fill="rgba(255,255,255,0.5)" transform="rotate(-28 18.2 6.8)"/>
          </svg>
          <h1>Molecula<span>X</span></h1>
        </div>
        <p>3D Structure Viewer</p>
      </header>
      <div class="molecule-list-container">
        <h2>Available Molecules</h2>
        <ul id="molecule-list">
          <!-- Dynamically populated -->
        </ul>
      </div>
    </aside>
    <main class="viewer-container">
      <div class="top-bar">
        <h2 id="current-molecule-name">Select a molecule</h2>
        <div class="viewer-controls">
          <button id="reset-view" title="Reset View">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
              <path d="M3 3v5h5" />
            </svg>
          </button>
          <button id="style-toggle" title="Toggle Style (Stick / Sphere)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
          <button id="label-toggle" title="Toggle Atom Labels & Multiple Bonds">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif"
                font-size="14" font-weight="bold" stroke="none" fill="currentColor">A</text>
            </svg>
          </button>
          <button id="ar-export" title="Export for AR (iPad / iPhone)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path
                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
              <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
              <line x1="12" y1="22.08" x2="12" y2="12" />
            </svg>
          </button>
        </div>
      </div>
      <div id="viewer-3d">
        <div id="empty-state">
          <div class="empty-icon"></div>
          <p>Select a molecule from the sidebar to view its 3D structure.</p>
        </div>
      </div>
      <!-- Molecule Info Panel -->
      <div id="molecule-info" class="molecule-info hidden">
        <div class="info-formula">
          <span class="info-label">Брутто-формула</span>
          <span id="info-formula-value" class="formula-value"></span>
        </div>
        <div class="info-structural-formula hidden" id="info-structural-formula-block">
          <span class="info-label">Структурная формула</span>
          <span id="info-structural-formula-value" class="structural-formula-value"></span>
        </div>
        <div class="info-structure">
          <span class="info-label">Структурная схема</span>
          <img id="info-structure-img" src="" alt="Структурная схема" />
        </div>
      </div>
    </main>
  </div>
</body>

</html>
